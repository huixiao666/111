    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 10px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .item {
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .item:hover {
            transform: scale(1.02);
        }

        .thumbnail {
            position: relative;
            width: 100%;
            height: 120px;
            background: #000;
            overflow: hidden;
        }

        .thumbnail video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .fullscreen-video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .duration {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }

        .title {
            padding: 8px;
            font-size: 13px;
            line-height: 1.3;
            color: #ddd;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
        }

        .nav-item {
            color: #888;
            font-size: 20px;
            cursor: pointer;
        }

        .nav-item:hover {
            color: white;
        }
    </style>
</head>

    <!-- 全屏视频覆盖层 -->

    <script>
        // 添加视频交互
        const fullscreenOverlay = document.getElementById('fullscreenOverlay');
        const fullscreenVideo = document.getElementById('fullscreenVideo');
        const closeBtn = document.getElementById('closeBtn');

        document.querySelectorAll('.item').forEach(item => {
            const video = item.querySelector('video');
            
            item.addEventListener('mouseenter', function() {
                if (video) {
                    video.play();
                }
            });
            
            item.addEventListener('mouseleave', function() {
                if (video) {
                    video.pause();
                    video.currentTime = 0;
                }
            });
            
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const videoSrc = video.querySelector('source').src;
                
                // 暂停所有缩略图视频
                document.querySelectorAll('.thumbnail video').forEach(v => {
                    v.pause();
                });
                
                // 设置全屏视频源
                fullscreenVideo.querySelector('source').src = videoSrc;
                fullscreenVideo.load();
                
                // 显示全屏覆盖层
                fullscreenOverlay.style.display = 'flex';
                
                // 播放全屏视频
                fullscreenVideo.play();
                
                console.log('播放全屏视频:', this.querySelector('.title').textContent);
            });
        });

        // 关闭全屏视频
        function closeFullscreen() {
            fullscreenOverlay.style.display = 'none';
            fullscreenVideo.pause();
            fullscreenVideo.currentTime = 0;
        }

        // 点击关闭按钮
        closeBtn.addEventListener('click', closeFullscreen);

        // 点击覆盖层背景关闭
        fullscreenOverlay.addEventListener('click', function(e) {
            if (e.target === fullscreenOverlay) {
                closeFullscreen();
            }
        });

        // ESC键关闭全屏
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && fullscreenOverlay.style.display === 'flex') {
                closeFullscreen();
            }
        });

        // 底部导航点击事件
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.addEventListener('click', function() {
                console.log('点击了导航');
            });
        });
    </script>
